name: Deploy Azure Prod

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

concurrency:
  group: deploy-azure-prod
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy API and Web
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: ci
    environment: prod

    env:
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP != '' && vars.AZURE_RESOURCE_GROUP || 'LearningBank-Prod' }}
      API_APP_NAME: learningbank-api-prod
      WEB_APP_NAME: learningbank-web-prod
      SLOT_NAME: staging
      APP_SERVICE_PLAN_NAME: learningbank-plan
      LOG_ANALYTICS_WORKSPACE_NAME: learningbank-law-prod
      APP_INSIGHTS_NAME: learningbank-ai-prod
      API_MANAGEMENT_NAME: learningbank-apim-prod
      FRONT_DOOR_PROFILE_NAME: learningbank-fd-prod
      FRONT_DOOR_ENDPOINT_NAME: learningbank-edge-prod
      FRONT_DOOR_WAF_POLICY_NAME: learningBankFdWafProd
      FRONT_DOOR_ROOT_DOMAIN_HOSTNAME: ${{ vars.FRONT_DOOR_ROOT_DOMAIN_HOSTNAME != '' && vars.FRONT_DOOR_ROOT_DOMAIN_HOSTNAME || 'mylearningbank.com' }}
      FRONT_DOOR_WWW_DOMAIN_HOSTNAME: ${{ vars.FRONT_DOOR_WWW_DOMAIN_HOSTNAME != '' && vars.FRONT_DOOR_WWW_DOMAIN_HOSTNAME || 'www.mylearningbank.com' }}
      FRONT_DOOR_DNS_ZONE_RESOURCE_ID: ${{ vars.FRONT_DOOR_DNS_ZONE_RESOURCE_ID != '' && vars.FRONT_DOOR_DNS_ZONE_RESOURCE_ID || '/subscriptions/21c70219-0509-4bf8-99a4-3d37145f583a/resourceGroups/LearningBank/providers/Microsoft.Network/dnszones/mylearningbank.com' }}
      FRONT_DOOR_CREATE_CUSTOM_DOMAINS: ${{ vars.FRONT_DOOR_CREATE_CUSTOM_DOMAINS != '' && vars.FRONT_DOOR_CREATE_CUSTOM_DOMAINS || 'false' }}
      FRONT_DOOR_ROOT_CUSTOM_DOMAIN_NAME: ${{ vars.FRONT_DOOR_ROOT_CUSTOM_DOMAIN_NAME != '' && vars.FRONT_DOOR_ROOT_CUSTOM_DOMAIN_NAME || 'mylearningbank-com-c8a3' }}
      FRONT_DOOR_WWW_CUSTOM_DOMAIN_NAME: ${{ vars.FRONT_DOOR_WWW_CUSTOM_DOMAIN_NAME != '' && vars.FRONT_DOOR_WWW_CUSTOM_DOMAIN_NAME || 'www-mylearningbank-com-5935' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/learning-bank-web/package-lock.json

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Register Azure resource providers
        run: |
          # Idempotent: registers the providers the template uses so a fresh
          # subscription does not fail with MissingSubscriptionRegistration.
          for ns in Microsoft.Sql Microsoft.Web Microsoft.KeyVault Microsoft.ManagedIdentity Microsoft.OperationalInsights Microsoft.Insights Microsoft.ApiManagement Microsoft.Cdn Microsoft.Network Microsoft.Resources; do
            az provider register --namespace "$ns" --wait
          done

      - name: Deploy Azure infrastructure (Bicep)
        env:
          API_AUTH_AUTHORITY: ${{ vars.API_AUTH_AUTHORITY }}
          API_AUTH_AUDIENCE: ${{ vars.API_AUTH_AUDIENCE }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AZURE_AD_CLIENT_ID: ${{ vars.AZURE_AD_CLIENT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          AZURE_AD_TENANT_ID: ${{ vars.AZURE_AD_TENANT_ID }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          SQL_SERVER_NAME: learningbank-sql-prod
          SQL_DATABASE_NAME: learningbank
          API_MANAGEMENT_PUBLISHER_EMAIL: ${{ vars.API_MANAGEMENT_PUBLISHER_EMAIL != '' && vars.API_MANAGEMENT_PUBLISHER_EMAIL || 'ops@learningbank.local' }}
          API_MANAGEMENT_PUBLISHER_NAME: ${{ vars.API_MANAGEMENT_PUBLISHER_NAME != '' && vars.API_MANAGEMENT_PUBLISHER_NAME || 'Learning Bank' }}
        run: |
          # The Azure SQL server + database are provisioned by this deployment;
          # the API uses managed identity (no credentials). Read the GitHub
          # OIDC principal object id from the token's `oid` claim so this run
          # can set SQL Entra admin and configure contained users in a later
          # workflow step without any Graph / directory-read permission.
          DEPLOY_OBJECT_ID=$(az account get-access-token --query accessToken --output tsv \
            | python3 -c "import sys,json,base64; p=sys.stdin.read().strip().split('.')[1]; p+='='*(-len(p)%4); print(json.loads(base64.urlsafe_b64decode(p))['oid'])")
          echo "DEPLOY_OBJECT_ID=$DEPLOY_OBJECT_ID" >> "$GITHUB_ENV"
          DEPLOY_NAME="lb-prod-$(date +%s)"
          az deployment group create \
            --name "$DEPLOY_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/main.bicep \
            --parameters \
              appServicePlanName="$APP_SERVICE_PLAN_NAME" \
              apiAppName="$API_APP_NAME" \
              webAppName="$WEB_APP_NAME" \
              createStagingSlots=true \
              slotName="$SLOT_NAME" \
              sqlServerName="$SQL_SERVER_NAME" \
              sqlDatabaseName="$SQL_DATABASE_NAME" \
              deployPrincipalObjectId="$DEPLOY_OBJECT_ID" \
              sqlAadAdminObjectId="$DEPLOY_OBJECT_ID" \
              sqlAadAdminLogin='github-deploy' \
              enableSqlUserSetupScript=false \
              appServicePlanSkuName='P1v3' \
              appServicePlanSkuTier='PremiumV3' \
              appServicePlanCapacity=2 \
              enableObservability=true \
              logAnalyticsWorkspaceName="$LOG_ANALYTICS_WORKSPACE_NAME" \
              logAnalyticsSkuName='PerGB2018' \
              logRetentionInDays=30 \
              appInsightsName="$APP_INSIGHTS_NAME" \
              enableApiManagement=true \
              apiManagementName="$API_MANAGEMENT_NAME" \
              apiManagementSkuName='Standard' \
              apiManagementSkuCapacity=1 \
              apiManagementPublisherEmail="$API_MANAGEMENT_PUBLISHER_EMAIL" \
              apiManagementPublisherName="$API_MANAGEMENT_PUBLISHER_NAME" \
              enableFrontDoor=true \
              enableFrontDoorCustomDomains=true \
              frontDoorProfileName="$FRONT_DOOR_PROFILE_NAME" \
              frontDoorEndpointName="$FRONT_DOOR_ENDPOINT_NAME" \
              frontDoorSkuName='Standard_AzureFrontDoor' \
              frontDoorWafPolicyName="$FRONT_DOOR_WAF_POLICY_NAME" \
              frontDoorRootDomainHostName="$FRONT_DOOR_ROOT_DOMAIN_HOSTNAME" \
              frontDoorWwwDomainHostName="$FRONT_DOOR_WWW_DOMAIN_HOSTNAME" \
              frontDoorDnsZoneResourceId="$FRONT_DOOR_DNS_ZONE_RESOURCE_ID" \
              frontDoorCreateCustomDomains="$FRONT_DOOR_CREATE_CUSTOM_DOMAINS" \
              frontDoorRootCustomDomainName="$FRONT_DOOR_ROOT_CUSTOM_DOMAIN_NAME" \
              frontDoorWwwCustomDomainName="$FRONT_DOOR_WWW_CUSTOM_DOMAIN_NAME" \
              apiAuthAuthority="$API_AUTH_AUTHORITY" \
              apiAuthAudience="$API_AUTH_AUDIENCE" \
              nextAuthUrl="$NEXTAUTH_URL" \
              nextPublicApiUrl="$NEXT_PUBLIC_API_URL" \
              googleClientId="$GOOGLE_CLIENT_ID" \
              googleClientSecret="$GOOGLE_CLIENT_SECRET" \
              azureAdClientId="$AZURE_AD_CLIENT_ID" \
              azureAdClientSecret="$AZURE_AD_CLIENT_SECRET" \
              azureAdTenantId="$AZURE_AD_TENANT_ID" \
              authSecret="$AUTH_SECRET"
          # Surface the SQL connection details (provisioned above) to later steps.
          SQL_FQDN=$(az deployment group show -g "$RESOURCE_GROUP" -n "$DEPLOY_NAME" --query properties.outputs.sqlServerFqdn.value --output tsv)
          SQL_DB=$(az deployment group show -g "$RESOURCE_GROUP" -n "$DEPLOY_NAME" --query properties.outputs.sqlDatabaseName.value --output tsv)
          API_SQL_IDENTITY_NAME=$(az deployment group show -g "$RESOURCE_GROUP" -n "$DEPLOY_NAME" --query properties.outputs.apiSqlIdentityName.value --output tsv)
          API_SQL_IDENTITY_PRINCIPAL_ID=$(az deployment group show -g "$RESOURCE_GROUP" -n "$DEPLOY_NAME" --query properties.outputs.apiSqlIdentityPrincipalId.value --output tsv)
          API_SQL_IDENTITY_CLIENT_ID=$(az deployment group show -g "$RESOURCE_GROUP" -n "$DEPLOY_NAME" --query properties.outputs.apiSqlIdentityClientId.value --output tsv)
          API_SQL_IDENTITY_RESOURCE_ID=$(az deployment group show -g "$RESOURCE_GROUP" -n "$DEPLOY_NAME" --query properties.outputs.apiSqlIdentityResourceId.value --output tsv)
          echo "SQL_SERVER_NAME=$SQL_SERVER_NAME" >> "$GITHUB_ENV"
          echo "SQL_SERVER_FQDN=$SQL_FQDN" >> "$GITHUB_ENV"
          echo "SQL_DATABASE_NAME=$SQL_DB" >> "$GITHUB_ENV"
          echo "API_SQL_IDENTITY_NAME=$API_SQL_IDENTITY_NAME" >> "$GITHUB_ENV"
          echo "API_SQL_IDENTITY_PRINCIPAL_ID=$API_SQL_IDENTITY_PRINCIPAL_ID" >> "$GITHUB_ENV"
          echo "API_SQL_IDENTITY_CLIENT_ID=$API_SQL_IDENTITY_CLIENT_ID" >> "$GITHUB_ENV"
          echo "API_SQL_IDENTITY_RESOURCE_ID=$API_SQL_IDENTITY_RESOURCE_ID" >> "$GITHUB_ENV"

      - name: Ensure API SQL UAMI is assigned to app and slot
        run: |
          set -euo pipefail
          get_uami_principal() {
            slot_arg="$1"
            az webapp identity show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$API_APP_NAME" \
              $slot_arg \
              --output json \
              | python3 -c "import json,sys; rid=sys.argv[1].strip('/').lower(); payload=json.load(sys.stdin); uamis=payload.get('userAssignedIdentities') or {}; identity=next((((v or {}).get('principalId') or '') for k,v in uamis.items() if (k or '').strip('/').lower()==rid), ''); print(identity)" "$API_SQL_IDENTITY_RESOURCE_ID"
          }

          ensure_uami() {
            target="$1"
            slot_arg="$2"

            existing=$(get_uami_principal "$slot_arg")

            if [ -n "$existing" ] && [ "$existing" != "null" ]; then
              echo "$target already has the shared SQL UAMI assigned."
              return
            fi

            echo "Assigning shared SQL UAMI to $target..."
            az webapp identity assign \
              --resource-group "$RESOURCE_GROUP" \
              --name "$API_APP_NAME" \
              $slot_arg \
              --identities "$API_SQL_IDENTITY_RESOURCE_ID" \
              --output none
          }

          ensure_uami "API app" ""
          ensure_uami "API staging slot" "--slot $SLOT_NAME"

      - name: Validate API app and slot have SQL UAMI
        run: |
          set -euo pipefail
          get_uami_principal() {
            slot_arg="$1"
            az webapp identity show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$API_APP_NAME" \
              $slot_arg \
              --output json \
              | python3 -c "import json,sys; rid=sys.argv[1].strip('/').lower(); payload=json.load(sys.stdin); uamis=payload.get('userAssignedIdentities') or {}; identity=next((((v or {}).get('principalId') or '') for k,v in uamis.items() if (k or '').strip('/').lower()==rid), ''); print(identity)" "$API_SQL_IDENTITY_RESOURCE_ID"
          }

          APP_UAMI=$(get_uami_principal "")
          SLOT_UAMI=$(get_uami_principal "--slot $SLOT_NAME")

          if [ -z "$APP_UAMI" ] || [ "$APP_UAMI" = "null" ]; then
            echo "API app is missing shared SQL UAMI assignment." >&2
            exit 1
          fi
          if [ -z "$SLOT_UAMI" ] || [ "$SLOT_UAMI" = "null" ]; then
            echo "API staging slot is missing shared SQL UAMI assignment." >&2
            exit 1
          fi

      - name: Validate SQL server identity is configured
        run: |
          set -euo pipefail
          SQL_IDENTITY_TYPE=$(az sql server show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$SQL_SERVER_NAME" \
            --query identity.type \
            --output tsv)
          SQL_PRIMARY_UAMI=$(az sql server show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$SQL_SERVER_NAME" \
            --query primaryUserAssignedIdentityId \
            --output tsv)

          if [ "$SQL_IDENTITY_TYPE" != "UserAssigned" ]; then
            echo "SQL logical server identity is not configured as UserAssigned." >&2
            exit 1
          fi

          if [ -z "$SQL_PRIMARY_UAMI" ] || [ "$SQL_PRIMARY_UAMI" = "null" ]; then
            echo "SQL logical server primary user-assigned identity is missing." >&2
            exit 1
          fi

      - name: Validate API SQL auth mode is Managed Identity
        run: |
          set -euo pipefail
          APP_CONN=$(az webapp config appsettings list \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --query "[?name=='ConnectionStrings__SqlServer'].value | [0]" \
            --output tsv)
          SLOT_CONN=$(az webapp config appsettings list \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --slot "$SLOT_NAME" \
            --query "[?name=='ConnectionStrings__SqlServer'].value | [0]" \
            --output tsv)

          if ! echo "$APP_CONN" | grep -q "Authentication=Active Directory Managed Identity"; then
            echo "Production slot SQL auth mode is not Managed Identity." >&2
            exit 1
          fi

          if ! echo "$APP_CONN" | grep -q "User Id=${API_SQL_IDENTITY_CLIENT_ID}"; then
            echo "Production app SQL connection string is not pinned to the shared API SQL identity." >&2
            exit 1
          fi

          if ! echo "$SLOT_CONN" | grep -q "Authentication=Active Directory Managed Identity"; then
            echo "Staging slot SQL auth mode is not Managed Identity." >&2
            exit 1
          fi

          if ! echo "$SLOT_CONN" | grep -q "User Id=${API_SQL_IDENTITY_CLIENT_ID}"; then
            echo "Staging slot SQL connection string is not pinned to the shared API SQL identity." >&2
            exit 1
          fi

      - name: Refresh Azure Login (OIDC) before SQL user setup
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure SQL contained users (OIDC, no deploymentScripts)
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/microsoft/go-sqlcmd/releases/download/v1.8.0/sqlcmd-linux-amd64.tar.bz2" -o /tmp/sqlcmd.tar.bz2
          mkdir -p /tmp/sqlcmd && tar -xjf /tmp/sqlcmd.tar.bz2 -C /tmp/sqlcmd
          SQLCMD=/tmp/sqlcmd/sqlcmd

          sid() { python3 -c "import uuid,sys; print(uuid.UUID(sys.argv[1]).bytes_le.hex())" "$1"; }

          GRANTS=/tmp/grants.sql
          : > "$GRANTS"

          emit() {
            uname="$1"; objid="$2"; ddl="$3"
            s=$(sid "$objid")
            printf "IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'%s')\n" "$uname" >> "$GRANTS"
            printf "  CREATE USER [%s] WITH SID = 0x%s, TYPE = E;\n" "$uname" "$s" >> "$GRANTS"
            printf "IF IS_ROLEMEMBER('db_datareader', '%s') <> 1\n" "$uname" >> "$GRANTS"
            printf "  ALTER ROLE db_datareader ADD MEMBER [%s];\n" "$uname" >> "$GRANTS"
            printf "IF IS_ROLEMEMBER('db_datawriter', '%s') <> 1\n" "$uname" >> "$GRANTS"
            printf "  ALTER ROLE db_datawriter ADD MEMBER [%s];\n" "$uname" >> "$GRANTS"
            if [ "$ddl" = "ddl" ]; then
              printf "IF IS_ROLEMEMBER('db_ddladmin', '%s') <> 1\n" "$uname" >> "$GRANTS"
              echo "  ALTER ROLE db_ddladmin ADD MEMBER [$uname];" >> "$GRANTS"
            fi
            echo "GO" >> "$GRANTS"
          }

          emit "$API_SQL_IDENTITY_NAME" "$API_SQL_IDENTITY_PRINCIPAL_ID" ""
          emit "${API_SQL_IDENTITY_NAME}-client" "$API_SQL_IDENTITY_CLIENT_ID" ""
          emit "github-deploy" "$DEPLOY_OBJECT_ID" "ddl"

          echo "----- grants.sql -----"
          cat "$GRANTS"

          for i in 1 2 3 4 5 6; do
            if "$SQLCMD" -S "$SQL_SERVER_FQDN" -d "$SQL_DATABASE_NAME" --authentication-method ActiveDirectoryDefault -i "$GRANTS" -b; then
              echo "SQL users configured."
              exit 0
            fi
            echo "Attempt $i failed; waiting for SQL Entra propagation..."
            sleep 20
          done
          echo "Failed to configure SQL users after retries." >&2
          exit 1

      - name: Verify SQL principal mapping for API managed identities
        run: |
          set -euo pipefail
          SQLCMD=/tmp/sqlcmd/sqlcmd

          sid() { python3 -c "import uuid,sys; print(uuid.UUID(sys.argv[1]).bytes_le.hex())" "$1"; }
          API_SQL_SID=$(sid "$API_SQL_IDENTITY_PRINCIPAL_ID")
          DEPLOY_SID=$(sid "$DEPLOY_OBJECT_ID")

          VERIFY=/tmp/verify-principals.sql
          printf "DECLARE @missing int = 0;\n" > "$VERIFY"
          printf "IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'%s' AND sid = 0x%s) BEGIN SET @missing = @missing + 1; PRINT 'Missing/mismatched: %s'; END\n" \
            "$API_SQL_IDENTITY_NAME" "$API_SQL_SID" "$API_SQL_IDENTITY_NAME" >> "$VERIFY"
          printf "IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'%s' AND sid = 0x%s) BEGIN SET @missing = @missing + 1; PRINT 'Missing/mismatched: %s'; END\n" \
            "${API_SQL_IDENTITY_NAME}-client" "$(sid "$API_SQL_IDENTITY_CLIENT_ID")" "${API_SQL_IDENTITY_NAME}-client" >> "$VERIFY"
          printf "IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'%s' AND sid = 0x%s) BEGIN SET @missing = @missing + 1; PRINT 'Missing/mismatched: %s'; END\n" \
            "github-deploy" "$DEPLOY_SID" "github-deploy" >> "$VERIFY"
          printf "IF IS_ROLEMEMBER('db_datareader', '%s') <> 1 BEGIN SET @missing = @missing + 1; PRINT 'Missing role db_datareader: %s'; END\n" \
            "$API_SQL_IDENTITY_NAME" "$API_SQL_IDENTITY_NAME" >> "$VERIFY"
          printf "IF IS_ROLEMEMBER('db_datawriter', '%s') <> 1 BEGIN SET @missing = @missing + 1; PRINT 'Missing role db_datawriter: %s'; END\n" \
            "$API_SQL_IDENTITY_NAME" "$API_SQL_IDENTITY_NAME" >> "$VERIFY"
          printf "IF IS_ROLEMEMBER('db_datareader', '%s') <> 1 BEGIN SET @missing = @missing + 1; PRINT 'Missing role db_datareader: %s'; END\n" \
            "${API_SQL_IDENTITY_NAME}-client" "${API_SQL_IDENTITY_NAME}-client" >> "$VERIFY"
          printf "IF IS_ROLEMEMBER('db_datawriter', '%s') <> 1 BEGIN SET @missing = @missing + 1; PRINT 'Missing role db_datawriter: %s'; END\n" \
            "${API_SQL_IDENTITY_NAME}-client" "${API_SQL_IDENTITY_NAME}-client" >> "$VERIFY"
          printf "IF IS_ROLEMEMBER('db_ddladmin', '%s') <> 1 BEGIN SET @missing = @missing + 1; PRINT 'Missing role db_ddladmin: %s'; END\n" \
            "github-deploy" "github-deploy" >> "$VERIFY"
          printf "IF @missing > 0 BEGIN THROW 50000, 'SQL contained user verification failed.', 1; END\n" >> "$VERIFY"
          printf "SELECT p.name, p.type_desc FROM sys.database_principals p WHERE p.name IN (N'%s', N'%s', N'github-deploy') ORDER BY p.name;\n" \
            "$API_SQL_IDENTITY_NAME" "${API_SQL_IDENTITY_NAME}-client" >> "$VERIFY"

          echo "----- verify-principals.sql -----"
          cat "$VERIFY"
          "$SQLCMD" -S "$SQL_SERVER_FQDN" -d "$SQL_DATABASE_NAME" --authentication-method ActiveDirectoryDefault -i "$VERIFY" -b

      - name: Publish API (self-contained linux-x64)
        run: |
          dotnet restore LearningBank.sln
          dotnet publish src/LearningBank.Api/LearningBank.Api.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output ./artifacts/api

      - name: Build Next.js standalone web
        working-directory: src/learning-bank-web
        run: |
          npm ci
          npm run build
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
          cp -R public .next/standalone/public

      - name: Refresh Azure Login (OIDC) before EF migrations
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run EF Core migrations against production DB
        run: |
          dotnet tool install --global dotnet-ef
          export PATH="$PATH:$HOME/.dotnet/tools"
          # SQL_SERVER_FQDN / SQL_DATABASE_NAME come from the Bicep deployment
          # outputs (set in GITHUB_ENV above). Authenticates as the workflow's
          # OIDC identity via Active Directory Default — no SQL credentials
          # required.
          export Database__Provider=SqlServer
          export ConnectionStrings__SqlServer="Server=tcp:${SQL_SERVER_FQDN},1433;Initial Catalog=${SQL_DATABASE_NAME};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;Authentication=Active Directory Default"
          dotnet ef database update \
            --project src/LearningBank.Infrastructure/LearningBank.Infrastructure.csproj \
            --startup-project src/LearningBank.Api/LearningBank.Api.csproj \
            --connection "$ConnectionStrings__SqlServer"

      - name: Deploy API to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.API_APP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ./artifacts/api

      - name: Resolve API default hostname (staging)
        id: api-host
        run: |
          HOSTNAME=$(az webapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --slot "$SLOT_NAME" \
            --query defaultHostName \
            --output tsv)
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: API smoke test (staging)
        run: curl --fail --show-error --silent "https://${{ steps.api-host.outputs.hostname }}/health"

      - name: Swap API staging to production
        run: |
          az webapp deployment slot swap \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --slot "$SLOT_NAME" \
            --target-slot production

      - name: Deploy Web to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ./src/learning-bank-web/.next/standalone

      - name: Resolve Web default hostname (staging)
        id: web-host
        run: |
          HOSTNAME=$(az webapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP_NAME" \
            --slot "$SLOT_NAME" \
            --query defaultHostName \
            --output tsv)
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Web smoke test (staging)
        run: curl --fail --show-error --silent "https://${{ steps.web-host.outputs.hostname }}/" > /dev/null

      - name: Swap Web staging to production
        run: |
          az webapp deployment slot swap \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP_NAME" \
            --slot "$SLOT_NAME" \
            --target-slot production

      - name: Resolve Front Door endpoint hostname
        id: frontdoor-host
        run: |
          HOSTNAME=$(az afd endpoint show \
            --resource-group "$RESOURCE_GROUP" \
            --profile-name "$FRONT_DOOR_PROFILE_NAME" \
            --endpoint-name "$FRONT_DOOR_ENDPOINT_NAME" \
            --query hostName \
            --output tsv)
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Front Door smoke test
        run: curl --fail --show-error --silent "https://${{ steps.frontdoor-host.outputs.hostname }}/" > /dev/null

      - name: Deployment summary
        run: |
          {
            echo "## Azure Deployment Summary"
            echo "- Commit: ${{ github.sha }}"
            echo "- API app: ${API_APP_NAME} (slot swapped from ${SLOT_NAME})"
            echo "- Web app: ${WEB_APP_NAME} (slot swapped from ${SLOT_NAME})"
            echo "- API Management: ${API_MANAGEMENT_NAME} (Standard)"
