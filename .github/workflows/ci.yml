name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, Test, Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/learning-bank-web/package-lock.json

      - name: Restore .NET
        run: dotnet restore LearningBank.sln

      - name: Build .NET
        run: dotnet build LearningBank.sln --configuration Release --no-restore

      - name: Test .NET with coverage
        run: dotnet test LearningBank.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --logger trx --results-directory ./TestResults

      - name: Install web dependencies
        working-directory: src/learning-bank-web
        run: npm ci

      - name: Lint web
        working-directory: src/learning-bank-web
        run: npm run lint

      - name: Typecheck web
        working-directory: src/learning-bank-web
        run: npm run typecheck

      - name: Test web
        working-directory: src/learning-bank-web
        run: npm run test

      - name: Build web
        working-directory: src/learning-bank-web
        run: npm run build

      - name: Check NuGet vulnerabilities
        shell: bash
        run: |
          set -euo pipefail
          dotnet list LearningBank.sln package --vulnerable --include-transitive | tee dotnet-vulnerabilities.txt
          if grep -qi "has the following vulnerable packages" dotnet-vulnerabilities.txt; then
            echo "Vulnerable NuGet package(s) detected."
            exit 1
          fi

      - name: Check npm vulnerabilities (high/critical)
        working-directory: src/learning-bank-web
        run: npm audit --omit=dev --audit-level=high

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults
            **/coverage.cobertura.xml

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp,javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
