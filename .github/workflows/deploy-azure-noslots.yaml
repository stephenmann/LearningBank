name: Deploy Azure (No Slots)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-noslots
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API and Web
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: prod

    env:
      RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP != '' && secrets.AZURE_RESOURCE_GROUP || vars.AZURE_RESOURCE_GROUP != '' && vars.AZURE_RESOURCE_GROUP || 'LearningBank' }}
      API_APP_NAME: learningbank-api
      WEB_APP_NAME: learningbank-web
      APP_SERVICE_PLAN_NAME: learningbank-plan

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/learning-bank-web/package-lock.json

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure infrastructure (Bicep)
        env:
          API_AUTH_AUTHORITY: ${{ secrets.API_AUTH_AUTHORITY }}
          API_AUTH_AUDIENCE: ${{ secrets.API_AUTH_AUDIENCE }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          API_CONNECTION_STRING: ${{ secrets.API_CONNECTION_STRING }}
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/main.bicep \
            --parameters \
              appServicePlanName="$APP_SERVICE_PLAN_NAME" \
              apiAppName="$API_APP_NAME" \
              webAppName="$WEB_APP_NAME" \
              createStagingSlots=false \
              apiAuthAuthority="$API_AUTH_AUTHORITY" \
              apiAuthAudience="$API_AUTH_AUDIENCE" \
              nextAuthUrl="$NEXTAUTH_URL" \
              nextPublicApiUrl="$NEXT_PUBLIC_API_URL" \
              googleClientId="$GOOGLE_CLIENT_ID" \
              googleClientSecret="$GOOGLE_CLIENT_SECRET" \
              azureAdClientId="$AZURE_AD_CLIENT_ID" \
              azureAdClientSecret="$AZURE_AD_CLIENT_SECRET" \
              azureAdTenantId="$AZURE_AD_TENANT_ID" \
              authSecret="$AUTH_SECRET" \
              apiConnectionString="$API_CONNECTION_STRING"

      - name: Publish API (self-contained linux-x64)
        run: |
          dotnet restore LearningBank.sln
          dotnet publish src/LearningBank.Api/LearningBank.Api.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output ./artifacts/api

      - name: Build Next.js standalone web
        working-directory: src/learning-bank-web
        run: |
          npm ci
          npm run build
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
          cp -R public .next/standalone/public

      - name: Run EF Core migrations against production DB
        env:
          ConnectionStrings__SqlServer: ${{ secrets.API_CONNECTION_STRING }}
        run: |
          dotnet tool install --global dotnet-ef
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update \
            --project src/LearningBank.Infrastructure/LearningBank.Infrastructure.csproj \
            --startup-project src/LearningBank.Api/LearningBank.Api.csproj \
            --connection "$ConnectionStrings__SqlServer"

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: learningbank-api
          package: ./artifacts/api

      - name: Resolve API default hostname
        id: api-host
        run: |
          HOSTNAME=$(az webapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --query defaultHostName \
            --output tsv)
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: API smoke test
        run: |
          curl --fail --show-error --silent --location \
            "https://${{ steps.api-host.outputs.hostname }}/health"

      - name: Deploy Web
        uses: azure/webapps-deploy@v3
        with:
          app-name: learningbank-web
          package: ./src/learning-bank-web/.next/standalone

      - name: Resolve Web default hostname
        id: web-host
        run: |
          HOSTNAME=$(az webapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP_NAME" \
            --query defaultHostName \
            --output tsv)
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Web smoke test
        run: curl --fail --show-error --silent "https://${{ steps.web-host.outputs.hostname }}/" > /dev/null

      - name: Deployment summary
        run: |
          {
            echo "## Azure Deployment Summary"
            echo "- Commit: ${{ github.sha }}"
            echo "- API app: ${API_APP_NAME} (deployed directly)"
            echo "- Web app: ${WEB_APP_NAME} (deployed directly)"
            echo "- Auth secrets source: GitHub repository secrets"
          } >> "$GITHUB_STEP_SUMMARY"
