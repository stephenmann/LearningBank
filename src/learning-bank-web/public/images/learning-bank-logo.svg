<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="Learning Bank">
  <title>Learning Bank</title>
  <desc>Learning Bank logo. A rounded gradient badge containing a piggy bank wearing a graduation cap, paired with the wordmark "Learning Bank".</desc>

  <defs>
    <!-- Learning Bank signature gradient: dark green → green → lime -->
    <linearGradient id="lbBrandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#054d28"/>
      <stop offset="55%" stop-color="#2ead4b"/>
      <stop offset="100%" stop-color="#9fe870"/>
    </linearGradient>

    <!-- Soft inner highlight for the piggy body to add subtle depth -->
    <linearGradient id="lbPigHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft drop shadow for the badge -->
    <filter id="lbBadgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ========== ICON MARK ========== -->
  <g filter="url(#lbBadgeShadow)">
    <!-- Rounded gradient badge -->
    <rect x="8" y="12" width="96" height="96" rx="22" ry="22" fill="url(#lbBrandGradient)"/>

    <!-- Piggy bank, centered inside the badge.
         Local coordinate space: the badge spans x:[8..104], y:[12..108]. -->

    <!-- Graduation cap mortarboard (square top) -->
    <g>
      <!-- Mortarboard plate -->
      <polygon points="36,44 76,44 56,52 16,52" fill="#0A2540"/>
      <polygon points="36,44 76,44 96,52 56,52" fill="#0A2540"/>
      <!-- Cap base / band sits just above the pig's head -->
      <path d="M 42 51 Q 56 56 70 51 L 70 56 Q 56 60 42 56 Z" fill="#0A2540"/>
      <!-- Tassel -->
      <line x1="80" y1="49" x2="86" y2="60" stroke="#FBBF24" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="86" cy="61" r="2.2" fill="#FBBF24"/>
    </g>

    <!-- Pig body -->
    <g>
      <!-- Main body: a soft rounded rectangle/ellipse -->
      <ellipse cx="56" cy="78" rx="26" ry="18" fill="#FFFFFF"/>
      <!-- Body highlight -->
      <ellipse cx="56" cy="74" rx="22" ry="12" fill="url(#lbPigHighlight)"/>

      <!-- Snout -->
      <ellipse cx="79" cy="78" rx="6" ry="5" fill="#FFFFFF"/>
      <circle cx="78" cy="77" r="0.9" fill="#0A2540"/>
      <circle cx="80.5" cy="77" r="0.9" fill="#0A2540"/>

      <!-- Eye -->
      <circle cx="68" cy="71" r="1.6" fill="#0A2540"/>

      <!-- Ear (one visible, cap covers the other) -->
      <path d="M 64 60 L 70 60 L 67 66 Z" fill="#FFFFFF"/>

      <!-- Coin slot on the back -->
      <rect x="48" y="63" width="12" height="2.4" rx="1.2" ry="1.2" fill="#0A2540"/>

      <!-- Legs -->
      <rect x="40" y="92" width="5" height="6" rx="1.5" fill="#FFFFFF"/>
      <rect x="50" y="93" width="5" height="6" rx="1.5" fill="#FFFFFF"/>
      <rect x="64" y="93" width="5" height="6" rx="1.5" fill="#FFFFFF"/>
      <rect x="74" y="92" width="5" height="6" rx="1.5" fill="#FFFFFF"/>

      <!-- Curly tail -->
      <path d="M 30 74 q -4 -2 -2 -6 q 2 -4 6 -2" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
    </g>

    <!-- A small coin going into the slot, anchoring the "savings" idea -->
    <g>
      <circle cx="54" cy="56" r="3.2" fill="#FBBF24" stroke="#0A2540" stroke-width="0.6"/>
      <text x="54" y="58.2" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="4.4" font-weight="700" fill="#0A2540">$</text>
    </g>
  </g>

  <!-- ========== WORDMARK ========== -->
  <g transform="translate(128, 0)">
    <!-- "Learning" — light weight for Stripe-style elegance -->
    <text x="0" y="62"
          font-family="Inter, 'Inter Variable', system-ui, -apple-system, sans-serif"
          font-size="36"
          font-weight="300"
          letter-spacing="-0.5"
          fill="#0A2540">Learning</text>

    <!-- "Bank" — medium weight, brand color, for emphasis -->
    <text x="0" y="98"
          font-family="Inter, 'Inter Variable', system-ui, -apple-system, sans-serif"
          font-size="36"
          font-weight="500"
          letter-spacing="-0.5"
          fill="#163300">Bank</text>

    <!-- Subtle accent dot between the two words to echo the gradient -->
    <circle cx="166" cy="88" r="3.5" fill="url(#lbBrandGradient)"/>
  </g>
</svg>
